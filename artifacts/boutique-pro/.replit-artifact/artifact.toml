kind = "web"
previewPath = "/"
title = "Boutique Pro"
version = "1.0.0"
id = "artifacts/boutique-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20271

[services.development]
run = "pnpm --filter @workspace/boutique-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boutique-pro", "run", "build" ]
publicDir = "artifacts/boutique-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20271"
BASE_PATH = "/"
